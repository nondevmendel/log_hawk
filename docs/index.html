<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Log Hawk</title>
<style>
  #gate {
    position:fixed; inset:0; z-index:9999;
    background:#0f0f0f; display:flex; align-items:center; justify-content:center;
  }
  #gate.hidden { display:none; }
  .gate-box {
    background:#1a1a1a; border:1px solid #252525; border-radius:12px;
    padding:36px 40px; display:flex; flex-direction:column; align-items:center; gap:18px;
    width:320px;
  }
  .gate-hawk { font-family:monospace; font-size:9px; line-height:1.25; color:#4a9eff; white-space:pre; opacity:.85; }
  .gate-title { font-size:17px; font-weight:700; letter-spacing:-.3px; }
  .gate-title span { color:#4a9eff; }
  .gate-box input {
    width:100%; background:#111; border:1px solid #333; border-radius:7px;
    color:#e0e0e0; font-size:14px; padding:10px 14px; outline:none; transition:border-color .15s;
  }
  .gate-box input:focus { border-color:#4a9eff; }
  .gate-box input.shake { animation:shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
  .gate-box button {
    width:100%; background:#4a9eff; border:none; border-radius:7px;
    color:#000; font-size:13px; font-weight:700; padding:10px; cursor:pointer; transition:opacity .15s;
  }
  .gate-box button:hover { opacity:.85; }
  .gate-err { font-size:11px; color:#e05555; min-height:14px; }
</style>
<style>
  :root {
    --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222; --border:#252525; --text:#e0e0e0;
    --muted:#666; --accent:#4a9eff; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

  header {
    position:sticky; top:0; z-index:100;
    background:rgba(15,15,15,.94); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:14px 28px; display:flex; align-items:center; gap:20px;
  }
  .logo { display:flex; align-items:center; gap:14px; }
  .hawk-ascii { font-family:monospace; font-size:9px; line-height:1.25; color:var(--accent); white-space:pre; opacity:.85; }
  .logo-text h1 { font-size:18px; font-weight:700; letter-spacing:-.3px; }
  .logo-text h1 span { color:var(--accent); }
  .logo-text p { font-size:11px; color:var(--muted); margin-top:1px; }
  .header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  #dot { width:7px; height:7px; border-radius:50%; background:#4caf50; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }
  #refresh-info { font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }

  main { padding:24px 28px; max-width:1600px; margin:0 auto; }

  .layout { display:grid; grid-template-columns:1fr 220px; gap:24px; align-items:start; }
  @media(max-width:860px) { .layout{grid-template-columns:1fr} .sidebar{display:none} }

  /* Segmented toggle */
  .toggle-bar { display:inline-flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:14px; }
  .tgl-btn { background:none; border:none; border-right:1px solid var(--border); color:var(--muted); padding:7px 20px; cursor:pointer; font-size:13px; font-weight:500; transition:.12s; }
  .tgl-btn:last-child { border-right:none; }
  .tgl-btn.active { background:var(--accent); color:#fff; }
  .tgl-btn:hover:not(.active) { background:rgba(74,158,255,.09); color:var(--text); }

  /* Browser: list + panel */
  .browser-body { display:grid; grid-template-columns:200px 1fr; border:1px solid var(--border); border-radius:10px; overflow:hidden; min-height:400px; }

  .group-col { display:flex; flex-direction:column; border-right:1px solid var(--border); max-height:62vh; }
  .group-header { padding:8px 10px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:7px; flex-shrink:0; }
  .group-header .date-select { width:100%; font-size:12px; padding:6px 8px; max-width:none; }
  .group-header .toggle-bar { display:flex; width:100%; margin-bottom:0; }
  .group-header .tgl-btn { flex:1; padding:5px 0; font-size:11px; }
  .group-list { overflow-y:auto; flex:1; }
  .group-item {
    padding:9px 14px 9px 12px; cursor:pointer; display:flex;
    justify-content:space-between; align-items:center;
    border-bottom:1px solid var(--border); border-left:2px solid transparent;
    transition:background .08s, border-color .08s;
  }
  .group-item:last-child { border-bottom:none; }
  .group-item:hover, .group-item.active { background:rgba(74,158,255,.07); border-left-color:var(--accent); }
  .g-label { font-size:13px; font-weight:500; transition:color .08s; }
  .group-item.active .g-label { color:var(--accent); }
  .g-count { font-size:10px; color:var(--muted); background:rgba(255,255,255,.05); padding:2px 6px; border-radius:9px; }

  /* Shot panel */
  .shot-panel {
    padding:14px; display:flex; flex-wrap:wrap; align-content:flex-start;
    gap:10px; overflow-y:auto; max-height:62vh;
  }
  .shot-thumb {
    width:172px; height:113px; object-fit:cover; border-radius:7px;
    cursor:pointer; border:2px solid transparent; flex-shrink:0;
    transition:border-color .12s, transform .12s;
  }
  .shot-thumb:hover { border-color:var(--accent); transform:scale(1.03); }
  .shot-tomb {
    width:172px; height:113px; border-radius:7px; flex-shrink:0;
    background:#111; border:2px solid var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    opacity:.5; cursor:default;
  }
  .shot-tomb .tomb-icon { font-size:18px; }
  .shot-tomb .tomb-lbl { font-size:10px; color:var(--muted); }
  .shot-tomb .tomb-domain { font-size:11px; color:var(--accent); font-weight:600; }
  .empty-panel { display:flex; align-items:center; justify-content:center; width:100%; color:var(--muted); font-size:13px; }

  /* Sidebar */
  .sidebar { display:flex; flex-direction:column; gap:16px; }
  .s-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:15px; }
  .s-card h3 { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin-bottom:11px; }
  .stat-block { padding:10px 0; border-bottom:1px solid var(--border); }
  .stat-block:last-child { border-bottom:none; }
  .stat-domain { color:var(--accent); font-weight:600; font-size:12px; margin-bottom:7px; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px 8px; }
  .stat-cell { display:flex; flex-direction:column; gap:1px; }
  .stat-cell .val { font-size:13px; font-weight:600; }
  .stat-cell .lbl { font-size:9px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
  .ignore-chip { display:inline-block; background:#111; border:1px solid var(--border); border-radius:4px; padding:3px 7px; font-size:10px; color:var(--muted); font-family:monospace; margin:2px 2px 2px 0; }

  .date-select {
    background:var(--surface); border:1px solid var(--border); border-radius:6px;
    color:var(--text); cursor:pointer; outline:none;
    transition:border-color .15s; color-scheme:dark;
  }
  .date-select:focus { border-color:var(--accent); }

  /* Lightbox */
  #lb { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.9); backdrop-filter:blur(8px); align-items:center; justify-content:center; flex-direction:column; gap:12px; cursor:pointer; }
  #lb.open { display:flex; }
  #lb img { max-width:95vw; max-height:87vh; border-radius:8px; box-shadow:0 32px 80px rgba(0,0,0,.8); }
  #lb-meta { font-size:12px; color:var(--muted); }
  #lb-close { position:absolute; top:18px; right:22px; background:none; border:none; color:var(--muted); font-size:30px; cursor:pointer; }
  #lb-close:hover { color:var(--text); }
  #lb-nav { display:flex; gap:10px; }
  #lb-nav button { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:7px 18px; border-radius:6px; cursor:pointer; font-size:12px; }
  #lb-nav button:disabled { opacity:.3; cursor:default; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <pre class="gate-hawk">     _,_
    (o,o)
 __/ )X( \__
/  _/ | \_  \
\_/   |   \_/
      |||
   ═══════</pre>
    <div class="gate-title">Log <span>Hawk</span></div>
    <input id="gate-pw" type="password" placeholder="Password" autofocus>
    <button onclick="gateCheck()">Enter</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<header>
  <div class="logo">
    <pre class="hawk-ascii" id="hawk-anim">     _,_
    (o,o)
 __/ )X( \__
/  _/ | \_  \
\_/   |   \_/
      |||
   ═══════</pre>
    <div class="logo-text">
      <h1>Log <span>Hawk</span></h1>
      <p>live screen log — social media only</p>
    </div>
  </div>
  <div class="header-right">
    <span id="dot"></span>
    <span id="refresh-info">Loading…</span>
  </div>
</header>

<main>
  <div class="layout">
    <div id="gallery"></div>
    <div class="sidebar">
      <div class="s-card">
        <h3>Top Sites This Week</h3>
        <div id="stats-list"><span style="font-size:12px;color:var(--muted)">No data yet</span></div>
      </div>
      <div class="s-card">
        <h3>Currently Ignored</h3>
        <div id="ignore-list"><span style="font-size:12px;color:var(--muted)">Nothing ignored</span></div>
      </div>
    </div>
  </div>
</main>

<div id="lb">
  <button id="lb-close" onclick="closeLb()">×</button>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
  <div id="lb-meta" onclick="event.stopPropagation()"></div>
  <div id="lb-nav" onclick="event.stopPropagation()">
    <button id="lb-prev" onclick="lbStep(-1)">← Newer</button>
    <button id="lb-next" onclick="lbStep(1)">Older →</button>
  </div>
</div>

<script>
const REFRESH_MS = 5 * 60 * 1000;
let allEntries = [], viewEntries = [], lbIdx = 0, nextRefresh = Date.now() + REFRESH_MS;
let currentMode = 'hour', currentGroups = [], activeIdx = -1, selectedDate = null;

function fmtTime(s) {
  if (!s) return '';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return h ? `${h}h ${m}m` : `${m}m`;
}
function weekKey() {
  const d = new Date(), yr = d.getFullYear();
  const wk = Math.ceil((d - new Date(yr,0,1)) / 604800000);
  return `${yr}-W${String(wk).padStart(2,'0')}`;
}

async function load() {
  try {
    const [ir, sr] = await Promise.all([
      fetch(`index.json?t=${Date.now()}`),
      fetch(`stats.json?t=${Date.now()}`),
    ]);
    allEntries = await ir.json();
    const stats = await sr.json().catch(() => ({}));
    renderBrowser();
    renderStats(stats.visits || {});
    renderIgnored(stats.ignored_urls || []);
  } catch(e) {
    document.getElementById('gallery').innerHTML = '<p style="color:var(--muted);padding:40px 0">Failed to load — retrying…</p>';
  }
}

// ── Grouping ──────────────────────────────────────────────────────────────────

function getFilteredEntries(includeDeleted = false) {
  return allEntries.filter(e =>
    (includeDeleted || !e.deleted) && (!selectedDate || e.iso.startsWith(selectedDate))
  );
}

function getUniqueDates() {
  const seen = new Map();
  allEntries.forEach(e => {
    const d = e.iso.slice(0, 10);
    if (!seen.has(d)) seen.set(d, e.date);
  });
  return [...seen.entries()].sort((a, b) => b[0].localeCompare(a[0]));
}

function getGroupKey(e, mode) {
  if (mode === 'hour') {
    const d = new Date(e.iso);
    const ds = d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
    const h = d.getHours(), ampm = h >= 12 ? 'PM' : 'AM';
    return `${ds} · ${h % 12 || 12}:00 ${ampm}`;
  }
  return e.domain || 'unknown';
}

function buildGroups(mode) {
  const m = new Map();
  getFilteredEntries(true).forEach(e => {
    const k = getGroupKey(e, mode);
    if (!m.has(k)) m.set(k, { key: k, entries: [], sortIso: e.iso });
    m.get(k).entries.push(e);
  });
  const arr = [...m.values()];
  if (mode === 'hour') arr.sort((a, b) => b.sortIso.localeCompare(a.sortIso));
  else arr.sort((a, b) => b.entries.length - a.entries.length);
  return arr;
}

// ── Render ────────────────────────────────────────────────────────────────────

function setMode(mode) {
  currentMode = mode;
  activeIdx = 0;
  renderBrowser();
}

function setDate(val) {
  selectedDate = val || null;
  activeIdx = 0;
  renderBrowser();
}

function shotThumb(e, i) {
  if (e.deleted) {
    return `<div class="shot-tomb" title="${e.display}">
      <span class="tomb-icon">🚫</span>
      <span class="tomb-lbl">removed</span>
      <span class="tomb-domain">${e.domain || ''}</span>
    </div>`;
  }
  return `<img class="shot-thumb" src="screenshots/${e.file}" loading="lazy" onclick="openLb(${i})" alt="" title="${e.display}">`;
}

function hoverGroup(idx) {
  if (idx === activeIdx) return;
  activeIdx = idx;
  document.querySelectorAll('.group-item').forEach(el => {
    el.classList.toggle('active', +el.dataset.gi === idx);
  });
  const entries = (currentGroups[idx] || {}).entries || [];
  viewEntries = entries;
  document.getElementById('shot-panel').innerHTML = entries.length
    ? entries.map(shotThumb).join('')
    : '<div class="empty-panel">No screenshots in this period</div>';
}

function renderBrowser() {
  currentGroups = buildGroups(currentMode);
  if (activeIdx < 0 || activeIdx >= currentGroups.length) activeIdx = 0;

  const gallery = document.getElementById('gallery');
  const live = getFilteredEntries().length;
  document.getElementById('refresh-info').textContent = `${live} screenshot${live!==1?'s':''}`;

  const dates = getUniqueDates();
  const dateOpts = dates.map(([iso, label]) =>
    `<option value="${iso}"${selectedDate===iso?' selected':''}>${label}</option>`
  ).join('');
  const leftHeader = `<div class="group-header">
    <select class="date-select" onchange="setDate(this.value)">
      <option value=""${!selectedDate?' selected':''}>All dates</option>
      ${dateOpts}
    </select>
    <div class="toggle-bar">
      <button class="tgl-btn${currentMode==='hour'?' active':''}" onclick="setMode('hour')">By Hour</button>
      <button class="tgl-btn${currentMode==='domain'?' active':''}" onclick="setMode('domain')">By Domain</button>
    </div>
  </div>`;

  if (!getFilteredEntries(true).length) {
    gallery.innerHTML = `<div class="browser-body">
      <div class="group-col">${leftHeader}<div class="group-list"></div></div>
      <div class="shot-panel"><div class="empty-panel">No screenshots yet. Daemon captures when you browse social media.</div></div>
    </div>`;
    return;
  }

  // List HTML — show group-date separators only when viewing all dates in hour mode
  let listHtml = '', lastDate = '';
  currentGroups.forEach((g, i) => {
    if (currentMode === 'hour') {
      const [date, hour] = g.key.split(' · ');
      if (!selectedDate && date !== lastDate) {
        listHtml += `<div class="group-date">${date}</div>`;
        lastDate = date;
      }
      const liveCount = g.entries.filter(e => !e.deleted).length;
      listHtml += `<div class="group-item${i===activeIdx?' active':''}" data-gi="${i}" onmouseenter="hoverGroup(${i})">
        <span class="g-label">${hour}</span><span class="g-count">${liveCount}</span>
      </div>`;
    } else {
      const liveCount = g.entries.filter(e => !e.deleted).length;
      listHtml += `<div class="group-item${i===activeIdx?' active':''}" data-gi="${i}" onmouseenter="hoverGroup(${i})">
        <span class="g-label">${g.key}</span><span class="g-count">${liveCount}</span>
      </div>`;
    }
  });

  // Panel for active group
  viewEntries = (currentGroups[activeIdx] || {}).entries || [];
  const panelHtml = viewEntries.length
    ? viewEntries.map(shotThumb).join('')
    : '<div class="empty-panel">No screenshots in this period</div>';

  gallery.innerHTML = `<div class="browser-body">
    <div class="group-col">${leftHeader}<div class="group-list">${listHtml}</div></div>
    <div class="shot-panel" id="shot-panel">${panelHtml}</div>
  </div>`;
}

// ── Lightbox ──────────────────────────────────────────────────────────────────

function openLb(i) {
  if (!viewEntries[i] || viewEntries[i].deleted) return;
  lbIdx = i; showLb();
  document.getElementById('lb').classList.add('open');
}
function showLb() {
  const e = viewEntries[lbIdx];
  document.getElementById('lb-img').src = `screenshots/${e.file}`;
  document.getElementById('lb-meta').textContent = e.display + (e.domain ? `  ·  ${e.domain}` : '');
  document.getElementById('lb-prev').disabled = lbIdx === 0;
  document.getElementById('lb-next').disabled = lbIdx === viewEntries.length - 1;
}
function lbStep(dir) {
  const n = lbIdx + dir;
  if (n >= 0 && n < viewEntries.length) { lbIdx = n; showLb(); }
}
function closeLb() { document.getElementById('lb').classList.remove('open'); }
document.getElementById('lb').addEventListener('click', function(e) {
  if (e.target === this) closeLb();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') lbStep(-1);
  if (e.key === 'ArrowRight') lbStep(1);
});

// ── Stats / Ignored ───────────────────────────────────────────────────────────

function renderStats(visits) {
  const el = document.getElementById('stats-list');
  const wk = weekKey();
  const rows = Object.entries(visits).sort((a,b) => (b[1].total_visits||0)-(a[1].total_visits||0));
  if (!rows.length) return;
  el.innerHTML = rows.map(([domain, v]) => {
    const daily = v.daily||{}, weekly = v.weekly||{};
    const ad = Math.max(Object.keys(daily).length,1), aw = Math.max(Object.keys(weekly).length,1);
    return `<div class="stat-block">
      <div class="stat-domain">${domain}</div>
      <div class="stat-grid">
        <div class="stat-cell"><span class="val">${((weekly[wk]||{}).visits)||0}</span><span class="lbl">this week</span></div>
        <div class="stat-cell"><span class="val">${(v.total_visits/ad).toFixed(1)}</span><span class="lbl">avg/day</span></div>
        <div class="stat-cell"><span class="val">${fmtTime(Math.round((v.total_time_seconds||0)/ad))||'—'}</span><span class="lbl">avg time/day</span></div>
        <div class="stat-cell"><span class="val">${fmtTime(Math.round((v.total_time_seconds||0)/aw))||'—'}</span><span class="lbl">avg time/wk</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderIgnored(list) {
  if (!list.length) return;
  document.getElementById('ignore-list').innerHTML = list.map(p => `<span class="ignore-chip">${p}</span>`).join('');
}
// ── Auto-refresh ──────────────────────────────────────────────────────────────

setInterval(() => {
  const rem = Math.max(0, nextRefresh - Date.now());
  const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
  const live = allEntries.filter(e=>!e.deleted).length;
  document.getElementById('refresh-info').textContent =
    `${live} screenshot${live!==1?'s':''} — refreshes in ${m}:${String(s).padStart(2,'0')}`;
  if (rem === 0) { nextRefresh = Date.now() + REFRESH_MS; load(); }
}, 1000);

// ── Password gate ─────────────────────────────────────────────────────────────

(function() {
  if (sessionStorage.getItem('lh_auth') === '1') document.getElementById('gate').classList.add('hidden');
  document.getElementById('gate-pw').addEventListener('keydown', e => { if (e.key === 'Enter') gateCheck(); });
})();

function gateCheck() {
  const inp = document.getElementById('gate-pw');
  if (inp.value === 'rebbe') {
    sessionStorage.setItem('lh_auth', '1');
    document.getElementById('gate').classList.add('hidden');
  } else {
    document.getElementById('gate-err').textContent = 'Wrong password.';
    inp.value = ''; inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake');
  }
}

load();

// ── Hawk flap ─────────────────────────────────────────────────────────────────

const HAWK_FRAMES = [
`  \\  _,_  /
   \\(o,o)/
    \\)X(/
     / \\
    /   \\
     |||
  ═══════    `,
`     _,_
    (o,o)
 __/ )X( \\__
/  _/ | \\_  \\
\\_/   |   \\_/
      |||
   ═══════   `,
`     _,_
    (o,o)
    / X \\
 __/  |  \\__
/_____|_____\\
      |||
   ═══════   `
];
let hawkFrame = 1;
const hawkEl = document.getElementById('hawk-anim');
setInterval(() => { hawkFrame = (hawkFrame+1) % HAWK_FRAMES.length; hawkEl.textContent = HAWK_FRAMES[hawkFrame]; }, 380);
</script>
</body>
</html>
