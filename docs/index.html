<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Hawk</title>
<style>
  :root {
    --bg:#0f0f0f; --surface:#1a1a1a; --border:#252525; --text:#e0e0e0;
    --muted:#666; --accent:#4a9eff; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

  header {
    position:sticky; top:0; z-index:100;
    background:rgba(15,15,15,.94); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:14px 28px; display:flex; align-items:center; gap:20px;
  }
  .logo { display:flex; align-items:center; gap:14px; }
  .hawk-ascii { font-family:monospace; font-size:9px; line-height:1.25; color:var(--accent); white-space:pre; opacity:.85; }
  .logo-text h1 { font-size:18px; font-weight:700; letter-spacing:-.3px; }
  .logo-text h1 span { color:var(--accent); }
  .logo-text p { font-size:11px; color:var(--muted); margin-top:1px; }
  .header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  #dot { width:7px; height:7px; border-radius:50%; background:#4caf50; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }
  #refresh-info { font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }

  main { padding:24px 28px; max-width:1600px; margin:0 auto; }

  .layout { display:grid; grid-template-columns:1fr 220px; gap:24px; align-items:start; }
  @media(max-width:860px) { .layout{grid-template-columns:1fr} .sidebar{display:none} }

  .day-label {
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.9px;
    color:var(--muted); margin-bottom:12px; margin-top:28px;
    padding-bottom:7px; border-bottom:1px solid var(--border);
  }
  .day-label:first-child { margin-top:0; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; }

  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; overflow:hidden; cursor:pointer;
    transition:transform .15s, border-color .15s, box-shadow .15s;
  }
  .card:hover { transform:translateY(-2px); border-color:var(--accent); box-shadow:0 8px 28px rgba(74,158,255,.1); }
  .card img { width:100%; height:195px; object-fit:cover; display:block; background:#111; }
  .card-meta { padding:10px 12px; display:flex; justify-content:space-between; align-items:center; }
  .card-meta .time { font-size:12px; font-weight:500; }
  .card-meta .domain { font-size:11px; color:var(--accent); }

  .card.tomb { cursor:default; opacity:.65; }
  .card.tomb:hover { transform:none; border-color:var(--border); box-shadow:none; }
  .tomb-body { height:195px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; background:#111; }
  .tomb-icon { font-size:22px; opacity:.4; }
  .tomb-label { font-size:11px; color:var(--muted); }
  .tomb-domain { font-size:13px; color:var(--text); font-weight:500; }

  .sidebar { display:flex; flex-direction:column; gap:16px; }
  .s-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:15px; }
  .s-card h3 { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin-bottom:11px; }

  .stat-block { padding:10px 0; border-bottom:1px solid var(--border); }
  .stat-block:last-child { border-bottom:none; }
  .stat-domain { color:var(--accent); font-weight:600; font-size:12px; margin-bottom:7px; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px 8px; }
  .stat-cell { display:flex; flex-direction:column; gap:1px; }
  .stat-cell .val { font-size:13px; font-weight:600; }
  .stat-cell .lbl { font-size:9px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }

  .ignore-chip { display:inline-block; background:#111; border:1px solid var(--border); border-radius:4px; padding:3px 7px; font-size:10px; color:var(--muted); font-family:monospace; margin:2px 2px 2px 0; }

  #lb { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.9); backdrop-filter:blur(8px); align-items:center; justify-content:center; flex-direction:column; gap:12px; }
  #lb.open { display:flex; }
  #lb img { max-width:95vw; max-height:87vh; border-radius:8px; box-shadow:0 32px 80px rgba(0,0,0,.8); }
  #lb-meta { font-size:12px; color:var(--muted); }
  #lb-close { position:absolute; top:18px; right:22px; background:none; border:none; color:var(--muted); font-size:30px; cursor:pointer; }
  #lb-close:hover { color:var(--text); }
  #lb-nav { display:flex; gap:10px; }
  #lb-nav button { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:7px 18px; border-radius:6px; cursor:pointer; font-size:12px; }
  #lb-nav button:disabled { opacity:.3; cursor:default; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <pre class="hawk-ascii" id="hawk-anim">     _,_
    (o,o)
 __/ )X( \__
/  _/ | \_  \
\_/   |   \_/
      |||
   ═══════</pre>
    <div class="logo-text">
      <h1>Log <span>Hawk</span></h1>
      <p>live screen log — social media only</p>
    </div>
  </div>
  <div class="header-right">
    <span id="dot"></span>
    <span id="refresh-info">Loading…</span>
  </div>
</header>

<main>
  <div class="layout">
    <div id="gallery"></div>

    <div class="sidebar">
      <div class="s-card">
        <h3>Top Sites This Week</h3>
        <div id="stats-list"><span style="font-size:12px;color:var(--muted)">No data yet</span></div>
      </div>
      <div class="s-card">
        <h3>Currently Ignored</h3>
        <div id="ignore-list"><span style="font-size:12px;color:var(--muted)">Nothing ignored</span></div>
      </div>
    </div>
  </div>
</main>

<div id="lb">
  <button id="lb-close" onclick="closeLb()">×</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-meta"></div>
  <div id="lb-nav">
    <button id="lb-prev" onclick="lbStep(-1)">← Newer</button>
    <button id="lb-next" onclick="lbStep(1)">Older →</button>
  </div>
</div>

<script>
const REFRESH_MS = 5 * 60 * 1000;
let allEntries = [], lbIdx = 0, nextRefresh = Date.now() + REFRESH_MS;

function fmtTime(s) {
  if (!s) return '';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return h ? `${h}h ${m}m` : `${m}m`;
}

function weekKey() {
  const d = new Date(), yr = d.getFullYear();
  const wk = Math.ceil((d - new Date(yr,0,1)) / 604800000);
  return `${yr}-W${String(wk).padStart(2,'0')}`;
}

async function load() {
  try {
    const [ir, sr] = await Promise.all([
      fetch(`index.json?t=${Date.now()}`),
      fetch(`stats.json?t=${Date.now()}`),
    ]);
    allEntries = await ir.json();
    const stats = await sr.json().catch(() => ({}));
    renderGallery();
    renderStats(stats.visits || {});
    renderIgnored(stats.ignored_urls || []);
  } catch(e) {
    document.getElementById("gallery").innerHTML = '<p style="color:var(--muted);padding:40px 0">Failed to load — retrying…</p>';
  }
}

function renderGallery() {
  const gallery = document.getElementById("gallery");
  const live = allEntries.filter(e => !e.deleted).length;
  document.getElementById("refresh-info").textContent = `${live} screenshot${live!==1?'s':''}`;

  if (!allEntries.length) {
    gallery.innerHTML = '<p style="color:var(--muted);padding:60px 0 0;text-align:center">No screenshots yet.<br>Daemon captures when you browse social media.</p>';
    return;
  }

  const groups = {};
  allEntries.forEach((e, i) => { (groups[e.date] = groups[e.date]||[]).push({...e,i}); });

  gallery.innerHTML = Object.entries(groups).map(([date, items]) => `
    <div class="day-label">${date} — ${items.length} item${items.length!==1?'s':''}</div>
    <div class="grid">${items.map(e => e.deleted ? tombCard(e) : liveCard(e)).join('')}</div>
  `).join('');
}

function liveCard(e) {
  return `<div class="card" onclick="openLb(${e.i})">
    <img src="screenshots/${e.file}" loading="lazy" alt="">
    <div class="card-meta"><span class="time">${e.display}</span><span class="domain">${e.domain||''}</span></div>
  </div>`;
}

function tombCard(e) {
  return `<div class="card tomb">
    <div class="tomb-body">
      <div class="tomb-icon">🚫</div>
      <div class="tomb-label">Screenshot removed</div>
      <div class="tomb-domain">${e.domain||'unknown domain'}</div>
    </div>
    <div class="card-meta"><span class="time">${e.display}</span><span class="domain" style="color:var(--muted)">deleted</span></div>
  </div>`;
}

function renderStats(visits) {
  const el = document.getElementById("stats-list");
  const wk = weekKey();
  const rows = Object.entries(visits)
    .sort((a,b) => (b[1].total_visits||0)-(a[1].total_visits||0));
  if (!rows.length) return;

  el.innerHTML = rows.map(([domain, v]) => {
    const daily  = v.daily  || {};
    const weekly = v.weekly || {};
    const activeDays  = Math.max(Object.keys(daily).length,  1);
    const activeWeeks = Math.max(Object.keys(weekly).length, 1);

    const avgDailyClicks = (v.total_visits / activeDays).toFixed(1);
    const avgDailyTime   = fmtTime(Math.round((v.total_time_seconds||0) / activeDays)) || '—';
    const avgWeeklyTime  = fmtTime(Math.round((v.total_time_seconds||0) / activeWeeks)) || '—';
    const thisWeek       = (weekly[wk] || {});
    const thisWeekVisits = thisWeek.visits || 0;

    return `<div class="stat-block">
      <div class="stat-domain">${domain}</div>
      <div class="stat-grid">
        <div class="stat-cell"><span class="val">${thisWeekVisits}</span><span class="lbl">this week</span></div>
        <div class="stat-cell"><span class="val">${avgDailyClicks}</span><span class="lbl">avg/day</span></div>
        <div class="stat-cell"><span class="val">${avgDailyTime}</span><span class="lbl">avg time/day</span></div>
        <div class="stat-cell"><span class="val">${avgWeeklyTime}</span><span class="lbl">avg time/week</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderIgnored(list) {
  if (!list.length) return;
  document.getElementById("ignore-list").innerHTML = list.map(p => `<span class="ignore-chip">${p}</span>`).join('');
}

function openLb(idx) {
  lbIdx = idx;
  if (allEntries[lbIdx]?.deleted) return;
  showLb(); document.getElementById("lb").classList.add("open");
}
function showLb() {
  const e = allEntries[lbIdx];
  document.getElementById("lb-img").src = `screenshots/${e.file}`;
  document.getElementById("lb-meta").textContent = e.display + (e.domain ? `  ·  ${e.domain}` : '');
  document.getElementById("lb-prev").disabled = !allEntries.slice(0,lbIdx).some(x=>!x.deleted);
  document.getElementById("lb-next").disabled = !allEntries.slice(lbIdx+1).some(x=>!x.deleted);
}
function lbStep(dir) {
  let i = lbIdx + dir;
  while (i>=0 && i<allEntries.length && allEntries[i].deleted) i+=dir;
  if (i>=0 && i<allEntries.length) { lbIdx=i; showLb(); }
}
function closeLb() { document.getElementById("lb").classList.remove("open"); }
document.addEventListener("keydown", e => {
  if (!document.getElementById("lb").classList.contains("open")) return;
  if (e.key==="Escape") closeLb();
  if (e.key==="ArrowLeft") lbStep(-1);
  if (e.key==="ArrowRight") lbStep(1);
});

setInterval(() => {
  const rem = Math.max(0, nextRefresh - Date.now());
  const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
  const live = allEntries.filter(e=>!e.deleted).length;
  document.getElementById("refresh-info").textContent =
    `${live} screenshot${live!==1?'s':''} — refreshes in ${m}:${String(s).padStart(2,'0')}`;
  if (rem===0) { nextRefresh=Date.now()+REFRESH_MS; load(); }
}, 1000);

load();

// Hawk flap animation
const HAWK_FRAMES = [
`  \\  _,_  /
   \\(o,o)/
    \\)X(/
     / \\
    /   \\
     |||
  ═══════    `,
`     _,_
    (o,o)
 __/ )X( \\__
/  _/ | \\_  \\
\\_/   |   \\_/
      |||
   ═══════   `,
`     _,_
    (o,o)
    / X \\
 __/  |  \\__
/_____|_____\\
      |||
   ═══════   `
];
let hawkFrame = 1;
const hawkEl = document.getElementById("hawk-anim");
setInterval(() => {
  hawkFrame = (hawkFrame + 1) % HAWK_FRAMES.length;
  hawkEl.textContent = HAWK_FRAMES[hawkFrame];
}, 380);
</script>
</body>
</html>
